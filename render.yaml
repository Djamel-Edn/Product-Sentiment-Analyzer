services:
  - type: web
    name: product-sentiment-analyzer
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run app.py --server.port=$PORT --server.address=0.0.0.0"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PROXY_USER
        sync: false
      - key: PROXY_PASS
        sync: false
      - key: PROXY_HOST
        sync: false
      - key: PROXY_PORT
        sync: false